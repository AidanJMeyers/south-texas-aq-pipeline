# =============================================================================
# Build and deploy the MkDocs site to GitHub Pages
# -----------------------------------------------------------------------------
# Triggers on every push to main. Uses GitHub's hosted runner — no secrets
# required. The site lands at:
#   https://<user-or-org>.github.io/<repo-name>/
#
# After pushing this file for the first time, go to:
#   Repo Settings -> Pages -> Source: "GitHub Actions"
# to enable the deployment.
# =============================================================================

name: Deploy MkDocs site

on:
  push:
    branches:
      - main
      - master
    paths:
      - "pipeline/docs/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - ".github/workflows/docs.yml"
  workflow_dispatch:  # allows manual "Run workflow" button

# Grants the workflow the minimum permissions required to deploy
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deployment at a time
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # git-revision-date-localized needs full history

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "requirements-docs.txt"

      - name: Install docs dependencies
        run: pip install -r requirements-docs.txt

      - name: Build site with MkDocs
        run: mkdocs build --strict

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
